name = "capela-fatima"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Serve o frontend buildado (SPA) pelo mesmo Worker — sem CORS, uma única URL.
[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
# Garante que requests /api/* executem o Worker antes de tentar servir um asset.
binding = "ASSETS"

# Banco de dados D1 (SQLite). Crie com:
#   wrangler d1 create capela-db
# e cole o database_id retornado abaixo.
[[d1_databases]]
binding = "DB"
database_name = "capela-db"
database_id = "PLACEHOLDER_DATABASE_ID"
migrations_dir = "migrations"

# Bucket R2 para as fotos. Crie com:
#   wrangler r2 bucket create capela-fotos
[[r2_buckets]]
binding = "FOTOS"
bucket_name = "capela-fotos"

# Segredos (defina com `wrangler secret put NOME`):
#   JWT_SECRET  → chave para assinar tokens de sessão do admin
[vars]
# Variáveis públicas (não sensíveis) podem ficar aqui.
APP_ENV = "production"
