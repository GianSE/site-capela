name = "site-capela"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Serve o frontend buildado (SPA) pelo mesmo Worker — sem CORS, uma única URL.
[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
# Garante que requests /api/* executem o Worker antes de tentar servir um asset.
binding = "ASSETS"

# Banco de dados D1 (SQLite). Crie com:
#   wrangler d1 create capela-db
# e cole o database_id retornado abaixo.
[[d1_databases]]
binding = "DB"
database_name = "capela-db"
database_id = "7f52890c-47ba-4ab6-b948-3afc420c1e1d"
migrations_dir = "migrations"

# Segredos (defina com `wrangler secret put NOME`):
#   JWT_SECRET   → chave para assinar tokens de sessão do admin
#   B2_APP_KEY   → applicationKey do Backblaze B2 (não versionar!)
[vars]
APP_ENV = "production"
# Backblaze B2 (armazenamento de fotos, grátis, sem cartão; egress grátis via Cloudflare).
# Pegue no painel do B2 (Buckets + Application Keys). Não são segredos fortes:
B2_ENDPOINT = "https://s3.us-east-005.backblazeb2.com"
B2_REGION = "us-east-005"
B2_BUCKET = "SEU_BUCKET"
B2_KEY_ID = "SEU_KEY_ID"
