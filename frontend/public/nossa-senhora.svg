<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" width="360" height="420" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4e2b0"/>
      <stop offset="0.5" stop-color="#e9c46a"/>
      <stop offset="1" stop-color="#b8862f"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#fff8e6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff8e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Moldura oval -->
  <ellipse cx="180" cy="210" rx="168" ry="200" fill="#fbf9f4"/>
  <ellipse cx="180" cy="210" rx="168" ry="200" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <!-- Halo -->
  <circle cx="180" cy="175" r="130" fill="url(#halo)"/>

  <!-- Estrelas ao redor -->
  <g fill="url(#gold)">
    <path d="M180 44l3 9 9 .5-7 6 2.5 9-7.5-5-7.5 5 2.5-9-7-6 9-.5z"/>
    <circle cx="92" cy="92" r="3"/>
    <circle cx="268" cy="92" r="3"/>
    <circle cx="60" cy="160" r="2.5"/>
    <circle cx="300" cy="160" r="2.5"/>
    <circle cx="120" cy="60" r="2"/>
    <circle cx="240" cy="60" r="2"/>
  </g>

  <!-- Coroa -->
  <g stroke="url(#gold)" stroke-width="3" fill="none" stroke-linejoin="round">
    <path d="M150 120 L156 96 L168 112 L180 90 L192 112 L204 96 L210 120 Z"/>
    <circle cx="180" cy="84" r="4" fill="url(#gold)"/>
  </g>

  <!-- Véu / manto -->
  <path d="M120 150 Q180 110 240 150 Q256 220 248 320 Q240 380 180 388 Q120 380 112 320 Q104 220 120 150 Z"
        fill="#fbf9f4" stroke="url(#gold)" stroke-width="3"/>

  <!-- Rosto -->
  <ellipse cx="180" cy="178" rx="34" ry="42" fill="#fbf9f4" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Olhos serenos (fechados) -->
  <path d="M166 176 q6 4 12 0" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M182 176 q6 4 12 0" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Boca -->
  <path d="M174 198 q6 4 12 0" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Mãos em oração -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="#fbf9f4">
    <path d="M180 250 Q172 270 176 300 Q180 312 180 312 Q180 312 184 300 Q188 270 180 250 Z"/>
  </g>

  <!-- Raios de luz das mãos -->
  <g stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <path d="M180 318 L180 340"/>
    <path d="M168 314 L158 332"/>
    <path d="M192 314 L202 332"/>
    <path d="M160 308 L146 320"/>
    <path d="M200 308 L214 320"/>
  </g>

  <!-- Coração imaculado -->
  <path d="M180 268 q-7 -8 -13 0 q-5 6 13 18 q18 -12 13 -18 q-6 -8 -13 0z"
        fill="#fff8e6" stroke="url(#gold)" stroke-width="1.5"/>
</svg>
